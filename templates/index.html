<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Камень, ножницы, бумага</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .choice-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        .choice-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .choice-btn:active {
            transform: translateY(0);
        }

        .game-area {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .choices-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .choice-display {
            text-align: center;
            flex: 1;
        }

        .choice-display h3 {
            color: #555;
            margin-bottom: 15px;
        }

        .choice-icon {
            font-size: 4em;
            padding: 20px;
            background: white;
            border-radius: 20px;
            display: inline-block;
            min-width: 150px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .result-message {
            font-size: 1.3em;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: bold;
        }

        .win {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .lose {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .tie {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .score {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            padding: 20px;
            background: #e9ecef;
            border-radius: 10px;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .reset-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .reset-btn:hover {
            background: #5a6268;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .choice-btn {
                padding: 15px 25px;
                font-size: 1em;
            }

            .choice-icon {
                font-size: 2.5em;
                min-width: 100px;
            }

            .result-message {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✊ Камень ✋ Ножницы ✌️ Бумага</h1>

        <div class="choices">
            <button class="choice-btn" data-choice="камень">✊ Камень</button>
            <button class="choice-btn" data-choice="ножницы">✌️ Ножницы</button>
            <button class="choice-btn" data-choice="бумага">✋ Бумага</button>
        </div>

        <div class="game-area">
            <div class="choices-display">
                <div class="choice-display">
                    <h3>Вы:</h3>
                    <div class="choice-icon" id="player-choice">—</div>
                </div>
                <div class="choice-display">
                    <h3>Компьютер:</h3>
                    <div class="choice-icon" id="computer-choice">—</div>
                </div>
            </div>

            <div class="result-message" id="result-message">
                Сделайте ход!
            </div>
        </div>

        <div class="score">
            <div class="score-item">
                <div class="score-label">Победы</div>
                <div class="score-value" id="wins">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Поражения</div>
                <div class="score-value" id="losses">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Ничьи</div>
                <div class="score-value" id="ties">0</div>
            </div>
        </div>

        <button class="reset-btn" id="reset-btn">Сбросить счёт</button>
    </div>

    <script>
        let scores = {
            wins: 0,
            losses: 0,
            ties: 0
        };

        function updateScoreDisplay() {
            document.getElementById('wins').textContent = scores.wins;
            document.getElementById('losses').textContent = scores.losses;
            document.getElementById('ties').textContent = scores.ties;
        }

        function getEmoji(choice) {
            const emojis = {
                'камень': '✊',
                'ножницы': '✌️',
                'бумага': '✋'
            };
            return emojis[choice] || choice;
        }

        async function makeChoice(choice) {
            try {
                const response = await fetch('/play', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ choice: choice })
                });

                const data = await response.json();

                if (response.ok) {
                    // Обновляем отображение выборов
                    document.getElementById('player-choice').innerHTML = getEmoji(data.player_choice) + ' ' + data.player_choice;
                    document.getElementById('computer-choice').innerHTML = getEmoji(data.computer_choice) + ' ' + data.computer_choice;

                    // Обновляем сообщение с результатом
                    const messageDiv = document.getElementById('result-message');
                    messageDiv.textContent = data.message;

                    // Обновляем класс для сообщения
                    messageDiv.classList.remove('win', 'lose', 'tie');
                    if (data.result === 'win') {
                        messageDiv.classList.add('win');
                        scores.wins++;
                    } else if (data.result === 'lose') {
                        messageDiv.classList.add('lose');
                        scores.losses++;
                    } else {
                        messageDiv.classList.add('tie');
                        scores.ties++;
                    }

                    updateScoreDisplay();
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Произошла ошибка при соединении с сервером');
            }
        }

        function resetScores() {
            scores = {
                wins: 0,
                losses: 0,
                ties: 0
            };
            updateScoreDisplay();

            // Сбрасываем отображение
            document.getElementById('player-choice').innerHTML = '—';
            document.getElementById('computer-choice').innerHTML = '—';
            const messageDiv = document.getElementById('result-message');
            messageDiv.textContent = 'Сделайте ход!';
            messageDiv.classList.remove('win', 'lose', 'tie');
        }

        // Добавляем обработчики для кнопок
        document.querySelectorAll('.choice-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const choice = btn.getAttribute('data-choice');
                makeChoice(choice);
            });
        });

        document.getElementById('reset-btn').addEventListener('click', resetScores);
    </script>
</body>
</html>
